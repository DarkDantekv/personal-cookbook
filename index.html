<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cultural Cookbook</title>
<style>
*{box-sizing:border-box;font-family:Georgia,serif}
body{margin:0;background:#f7f1e8;color:#3b2f2f}
header{padding:40px;text-align:center;background:linear-gradient(to right,#fffaf0,#f8e8d0)}
.container{display:grid;grid-template-columns:320px 1fr;min-height:100vh}
.sidebar{background:#fffaf4;padding:25px;border-right:2px solid #eadcc7;height:100vh;overflow:auto;position:sticky;top:0}
.main{padding:30px}
.recipe-card{background:white;border-radius:24px;padding:24px;margin-bottom:25px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
.recipe-link{display:block;padding:10px;border-radius:10px;text-decoration:none;color:#5b4636;margin-bottom:6px}
.recipe-link:hover{background:#f5e8d7}
.region-title{margin-top:18px;font-size:20px;border-bottom:1px solid #ddd;padding-bottom:6px}
.subcategory-title{margin-left:10px;font-size:16px;color:#8b5e3c}
.badge{background:#fff2d8;padding:8px 14px;border-radius:999px;margin-right:8px;font-size:14px;display:inline-block;margin-bottom:8px}
input,textarea{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{padding:12px 16px;border:none;border-radius:12px;cursor:pointer;font-weight:bold}
.primary{background:#8b5e3c;color:white}
.edit-btn{background:#f59e0b;color:white}
.delete-btn{background:#dc2626;color:white}
.favorite{color:gold;font-size:24px;cursor:pointer}
.check-item{display:flex;align-items:center;justify-content:flex-start;gap:14px;margin:10px 0;padding:12px 16px;background:#fffaf4;border-radius:14px;border:1px solid #eadcc7;max-width:550px;width:100%}.check-item input{width:18px;height:18px;flex-shrink:0}.check-item span{font-size:18px;line-height:1.4;text-align:left;flex:1}
.notes-box{background:#faf6ef;padding:15px;border-radius:16px;margin-top:20px}
.gallery{display:flex;gap:15px;flex-wrap:wrap;margin:15px 0}
.gallery img{width:220px;height:160px;object-fit:cover;border-radius:16px}
details{margin-top:18px;background:#fcf8f1;padding:12px 16px;border-radius:14px}
summary{font-size:20px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<header>
<h1>📖 Cultural Cookbook</h1>
<p>A living collection of recipes, traditions, and family history.</p>
</header>

<div class="container">
<aside class="sidebar">
<h2>Table of Contents</h2>
<input id="search" placeholder="Search recipes..." oninput="renderRecipes()" />
<div id="recipeLinks"></div>
<button class="primary" onclick="openModal()">+ Add Recipe</button>
</aside>

<main class="main">
<div id="recipeContainer"></div>
</main>
</div>

<div id="recipeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);justify-content:center;align-items:center;">
<div style="background:white;padding:25px;border-radius:24px;width:min(700px,95%);max-height:90vh;overflow:auto;">
<h2>Add / Edit Recipe</h2>
<input id="recipeTitle" placeholder="Recipe title" />
<input id="recipeRegion" placeholder="Region" />
<input id="recipeSubcategory" placeholder="Subcategory" />
<input id="recipeDifficulty" placeholder="Difficulty" />
<input id="recipePrep" placeholder="Prep time" />
<input id="recipeCook" placeholder="Cook time" />
<input id="recipeServings" placeholder="Servings" />
<input id="recipeOrigin" placeholder="Family origin / story" />
<input id="recipeIngredientsImage" type="file" accept="image/*" />
<input id="recipePrepImage" type="file" accept="image/*" />
<input id="recipeFinalImage" type="file" accept="image/*" />
<textarea id="recipeIngredients" placeholder="Ingredients (one per line)"></textarea>
<textarea id="recipeSteps" placeholder="Steps (one per line)"></textarea>
<textarea id="recipeNotes" placeholder="Notes / Reviews / Tips"></textarea>
<button class="primary" onclick="saveRecipe()">Save Recipe</button>
</div>
</div>

<script>
let recipes = JSON.parse(localStorage.getItem('cookbookRecipes')) || [];
let editingRecipeId = null;

function saveData(){ localStorage.setItem('cookbookRecipes', JSON.stringify(recipes)); }
function openModal(){ document.getElementById('recipeModal').style.display='flex'; }
function closeModal(){ document.getElementById('recipeModal').style.display='none'; }

function fileToBase64(file){
  return new Promise(resolve=>{
    if(!file) return resolve('');
    const reader = new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.readAsDataURL(file);
  });
}

async function saveRecipe(){
  const ingredientsImg = await fileToBase64(recipeIngredientsImage.files[0]);
  const prepImg = await fileToBase64(recipePrepImage.files[0]);
  const finalImg = await fileToBase64(recipeFinalImage.files[0]);

  const existing = recipes.find(r=>r.id===editingRecipeId) || {};

  const recipe = {
    id: editingRecipeId || Date.now(),
    title: recipeTitle.value,
    region: recipeRegion.value,
    subcategory: recipeSubcategory.value,
    difficulty: recipeDifficulty.value,
    prep: recipePrep.value,
    cook: recipeCook.value,
    servings: recipeServings.value,
    origin: recipeOrigin.value,
    ingredients: recipeIngredients.value.split('\n').filter(Boolean),
    steps: recipeSteps.value.split('\n').filter(Boolean),
    notes: recipeNotes.value,
    favorite: existing.favorite || false,
    images: {
      ingredients: ingredientsImg || existing?.images?.ingredients || '',
      prep: prepImg || existing?.images?.prep || '',
      final: finalImg || existing?.images?.final || ''
    }
  };

  if(editingRecipeId){
    const index = recipes.findIndex(r=>r.id===editingRecipeId);
    recipes[index] = recipe;
  } else {
    recipes.push(recipe);
  }

  editingRecipeId = null;
  saveData();
  renderRecipes();
  closeModal();
}

function editRecipe(id){
  const r = recipes.find(x=>x.id===id);
  editingRecipeId = id;
  recipeTitle.value = r.title;
  recipeRegion.value = r.region;
  recipeSubcategory.value = r.subcategory;
  recipeDifficulty.value = r.difficulty;
  recipePrep.value = r.prep;
  recipeCook.value = r.cook;
  recipeServings.value = r.servings;
  recipeOrigin.value = r.origin;
  recipeIngredients.value = r.ingredients.join('\n');
  recipeSteps.value = r.steps.join('\n');
  recipeNotes.value = r.notes;
  openModal();
}

function deleteRecipe(id){
  recipes = recipes.filter(r=>r.id!==id);
  saveData();
  renderRecipes();
}

function toggleFavorite(id){
  const recipe = recipes.find(r=>r.id===id);
  recipe.favorite = !recipe.favorite;
  saveData();
  renderRecipes();
}

function renderRecipes(){
  const search = document.getElementById('search').value.toLowerCase();
  const recipeContainer = document.getElementById('recipeContainer');
  const recipeLinks = document.getElementById('recipeLinks');
  recipeContainer.innerHTML='';
  recipeLinks.innerHTML='';

  const grouped = {};

  recipes.filter(r =>
    r.title.toLowerCase().includes(search) ||
    r.region.toLowerCase().includes(search) ||
    r.subcategory.toLowerCase().includes(search)
  ).forEach(recipe => {
    if(!grouped[recipe.region]) grouped[recipe.region] = {};
    if(!grouped[recipe.region][recipe.subcategory]) grouped[recipe.region][recipe.subcategory] = [];
    grouped[recipe.region][recipe.subcategory].push(recipe);
  });

  Object.keys(grouped).forEach(region => {
    recipeLinks.innerHTML += `<div class='region-title'>${region}</div>`;
    Object.keys(grouped[region]).forEach(sub => {
      recipeLinks.innerHTML += `<div class='subcategory-title'>${sub}</div>`;
      grouped[region][sub].forEach(recipe => {
        recipeLinks.innerHTML += `<a href='#recipe-${recipe.id}' class='recipe-link'>${recipe.title}</a>`;

        recipeContainer.innerHTML += `
        <div class='recipe-card' id='recipe-${recipe.id}'>
          <div style='display:flex;justify-content:space-between;'>
            <h2>${recipe.title}</h2>
            <span class='favorite' onclick='toggleFavorite(${recipe.id})'>${recipe.favorite ? '⭐' : '☆'}</span>
          </div>

          <div>
            <span class='badge'>🌍 ${recipe.region}</span>
            <span class='badge'>🍽 ${recipe.subcategory}</span>
            <span class='badge'>🔥 ${recipe.difficulty}</span>
            <span class='badge'>⏱ Prep ${recipe.prep}</span>
            <span class='badge'>🍳 Cook ${recipe.cook}</span>
            <span class='badge'>👨‍👩‍👧 ${recipe.servings}</span>
          </div>

          <p><strong>Origin:</strong> ${recipe.origin}</p>

          <div class='gallery'>
            ${recipe.images?.ingredients ? `<img src='${recipe.images.ingredients}' alt='Ingredients'>` : ''}
            ${recipe.images?.prep ? `<img src='${recipe.images.prep}' alt='Prep'>` : ''}
            ${recipe.images?.final ? `<img src='${recipe.images.final}' alt='Final Dish'>` : ''}
          </div>

          <details>
            <summary>Ingredients</summary>
            ${recipe.ingredients.map(i => `
              <label class='check-item'>
                <input type='checkbox'>
                <span>${i}</span>
              </label>
            `).join('')}
          </details>

          <details>
            <summary>Instructions</summary>
            <ol>${recipe.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
          </details>

          <details>
            <summary>Notes / Reviews</summary>
            <div class='notes-box'>${recipe.notes || 'No notes yet.'}</div>
          </details>

          <div style='margin-top:15px;display:flex;gap:10px;'>
            <button class='edit-btn' onclick='editRecipe(${recipe.id})'>✏️ Edit</button>
            <button class='delete-btn' onclick='deleteRecipe(${recipe.id})'>🗑 Delete</button>
          </div>
        </div>`;
      });
    });
  });
}

document.getElementById('recipeModal').addEventListener('click', (e)=>{
  if(e.target.id==='recipeModal') closeModal();
});

renderRecipes();
</script>
</body>
</html>
